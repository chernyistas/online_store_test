
name: Deploy to Server
on:
  push:
    branches: [main, master]
  workflow_dispatch:


jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to know_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Copy project files to server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude '__pycache__' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'venv' \
            --exclude 'staticfiles' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_DIR }}

      - name: Install dependencies and  migrate
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd ${{ secrets.DEPLOY_DIR }}
            
            if [ ! -d "venv" ]; then
              /usr/bin/python3 -m venv venv
            fi
            
            /usr/bin/python3 -m venv venv --clear
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt
            
            ./venv/bin/python manage.py migrate --noinput
            ./venv/bin/python manage.py collectstatic --noinput
          EOF
      - name: Restart application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd ${{ secrets.DEPLOY_DIR }}
            . venv/bin/activate
          
            pkill -f "gunicorn" || true
          
            ./venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:8000 --daemon          
            echo "✅ Application restarted"
          EOF
