services:
  db:
    image: postgres:16
    container_name: online_store_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - online_store_network

  redis:
    image: redis:7
    container_name: online_store_redis
    volumes:
      - redis_data:/data
    networks:
      - online_store_network

  web:
    build: .
    container_name: online_store_web
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    networks:
      - online_store_network
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"

  nginx:
    build: ./nginx
    container_name: online_store_nginx
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    networks:
      - online_store_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  online_store_network:
    driver: bridge
