{% extends 'base.html' %}

{% block title %}Удаление товара - Online store{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title">Удаление товара</h3>
                    <p class="card-text">Вы уверены, что хотите удалить карточку продукта {{ object.name }}</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Удалить</button>
                        <a href="{% url 'catalog:product_detail' object.pk %}" class="btn btn-secondary">Отменить</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
